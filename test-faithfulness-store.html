<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>With Little — Store Tests</title>
<style>
  :root{--bg-page:#1c2129;--text-primary:#f4efe4;--text-secondary:#b5ad9e;--gold:#dbb256;--green:#52966a;--red:#d47878}
  body{font:15px/1.5 system-ui,sans-serif;max-width:760px;margin:40px auto;padding:0 20px;background:var(--bg-page);color:var(--text-primary)}
  h1{font-family:Georgia,serif;color:var(--gold)}
  .pass{color:var(--green)}.fail{color:var(--red)}
  li{margin:6px 0}
</style>
</head>
<body>
<h1>With Little — Data Layer Tests</h1>
<p id="status">Running…</p>
<ul id="results"></ul>
<script src="faithfulness-store.js?v=2"></script>
<script src="stewardship-store.js?v=2"></script>
<script>
(async function(){
  const ul = document.getElementById('results');
  const status = document.getElementById('status');
  function row(r){ ul.innerHTML += '<li class="'+(r.pass?'pass':'fail')+'">'+(r.pass?'PASS':'FAIL')+': '+r.name+(r.detail?' — '+r.detail:'')+'</li>'; }
  try{
    window.storage = createMemoryStorage();
    const faith = await runFaithfulnessStoreTests(()=> new FaithfulnessStore(createMemoryStorage()));
    const stew = await runStewardshipStoreTests();
    faith.results.forEach(row);
    stew.results.forEach(row);
    status.textContent = faith.pass && stew.pass ? 'Done.' : 'Failed.';
  }catch(e){
    status.textContent = 'Error: '+e.message;
  }
})();
</script>
</body>
</html>
